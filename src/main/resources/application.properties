#server
spring.application.name=spring-app
server.port=9001

#logging
#logging.level.root=DEBUG

#special debug
# Core Spring Web (controllers, multipart, request parsing)
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.web.multipart=DEBUG
logging.level.org.springframework.web.servlet.mvc.method.annotation=DEBUG

# Multipart resolver (very important for your case)
logging.level.org.springframework.web.multipart.support=TRACE
logging.level.org.apache.catalina.core=DEBUG

# Spring Security (filters, auth, request rejection)
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.security.web=TRACE
logging.level.org.springframework.security.authentication=DEBUG

# Tomcat request/connection issues
logging.level.org.apache.coyote.http11=DEBUG

# Jackson (serialization/deserialization issues)
logging.level.com.fasterxml.jackson=DEBUG

# Optional: Hibernate (if DB involved)
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql=TRACE


#db
fintech.dbuser = ${DB_USERNAME}
fintech.dbpass = ${DB_PASSWORD}
fintech.dburl = ${DB_URL}

# Enable multipart
spring.servlet.multipart.enabled=true

# File size limits
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Tomcat limits (IMPORTANT for Boot 4)
server.tomcat.max-http-form-post-size=10MB
server.tomcat.max-swallow-size=-1



#caching
spring.cache.cache-names=loanBalancesTrackerCache
spring.cache.caffeine.spec=maximumSize=10,expireAfterWrite=30m

#Monitoring (actuator)
management.server.port=9002
management.server.address=127.0.0.1
management.metrics.tags.application=${spring.application.name}
#management.endpoints.web.exposure.include=health,info,prometheus
management.endpoints.web.exposure.include=prometheus
# prevent sensitive info exposure
management.endpoint.health.show-details=never

#mailing settings
